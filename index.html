<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SubjectAI | Access</title>
<style>
body {
    background:#000;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    font-family:Arial;
}
.box {
    text-align:center;
}
input {
    padding:12px;
    background:#111;
    border:1px solid #333;
    color:#fff;
}
button {
    padding:12px;
    background:#fff;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h2>ACCESS REQUIRED</h2>
    <input id="pass" placeholder="Şifre">
    <button onclick="login()">GİR</button>
</div>

<script>
const fp = btoa(navigator.userAgent + screen.width);

async function login() {
  const password = document.getElementById("pass").value;

  const res = await fetch("/login", {
    method: "POST",
    body: JSON.stringify({ password, fingerprint: fp })
  });

  if (res.status !== 200) return alert("Hatalı şifre");

  const data = await res.json();

  if (data.role === "admin") {
    location.href = "admin.html";
  } else {
    localStorage.setItem("fp", fp);

    if (data.firstTime) {
      location.href = "intro.html";
    } else {
      location.href = "app.html";
    }
  }
}
</script>

</body>
</html>
