<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>SubjectAI</title>
<style>
body{background:#000;color:#fff;font-family:Arial;display:flex;align-items:center;justify-content:center;height:100vh;}
input{padding:10px;background:#111;border:1px solid #333;color:#fff;}
button{padding:10px;background:#fff;border:none;cursor:pointer;}
</style>
</head>
<body>

<div>
<h2>ACCESS</h2>
<input id="pass">
<button onclick="login()">GİR</button>
</div>

<script>
const WORKER = "https://subjectai.emrevemiralp.workers.dev";
const fp = btoa(navigator.userAgent + screen.width);

async function login(){
 const res = await fetch(WORKER+"/login",{
  method:"POST",
  body:JSON.stringify({password:pass.value,fingerprint:fp})
 });

 if(res.status!==200) return alert("Hatalı");

 const data = await res.json();

 if(data.role==="admin"){
  location.href="admin.html";
 }else{
  localStorage.setItem("fp",fp);

  if(data.firstTime){
    location.href="intro.html";
  }else{
    location.href="app.html";
  }
 }
}
</script>

</body>
</html>
