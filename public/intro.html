<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#000;color:#fff;overflow:hidden;font-family:Arial;}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.text{position:absolute;opacity:0;transition:1s;letter-spacing:8px;}
#logo{font-size:40px;opacity:0;transform:scale(2);}
</style>
</head>

<body onclick="start()">

<div id="stage">
<div id="t1" class="text">MULTI AI SYSTEM</div>
<div id="t2" class="text">INITIALIZING...</div>
<div id="t3" class="text">SYNC COMPLETE</div>
<div id="t4" class="text">ACCESS GRANTED</div>
<div id="logo">SUBJECT AI</div>
</div>

<audio id="music" src="ACIDO III (Over Slowed).mp3"></audio>

<script>
const m=document.getElementById("music");

const beats=[
{id:"t1",time:6},
{id:"t2",time:10},
{id:"t3",time:16},
{id:"t4",time:22},
{id:"logo",time:34}
];

function show(id){
 document.querySelectorAll(".text").forEach(e=>e.style.opacity=0);
 const el=document.getElementById(id);
 el.style.opacity=1;
 if(id==="logo") el.style.transform="scale(1)";
}

function start(){
 m.play();
 beats.forEach(b=>setTimeout(()=>show(b.id),b.time*1000));
 setTimeout(()=>location.href="app.html",38000);
}
</script>

</body>
</html>
</script>

</body>
</html>
